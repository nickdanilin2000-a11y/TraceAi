version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: traceai_postgres
    environment:
      POSTGRES_DB: traceai_db
      POSTGRES_USER: traceai
      POSTGRES_PASSWORD: traceai_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: traceai_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: